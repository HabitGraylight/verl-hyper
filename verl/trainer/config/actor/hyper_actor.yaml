# defaults specify the default config from each component
defaults:

  # fsdp-compatible optimizer config
  - ../optim@optim: fsdp

  # HyperParallel engine config
  - ../engine@fsdp_config: hyper

  # base actor config
  - actor

  # load local overrides last
  - _self_

# Target class for this configuration
_target_: verl.workers.config.FSDPActorConfig

# HyperParallel HSDP strategy
strategy: hyper

# Gradient clipping for actor updates.
grad_clip: 1.0

# Sequence parallelism size for Ulysses-style model parallelism.
ulysses_sequence_parallel_size: 1

# calculate entropy with chunking to reduce memory peak
entropy_from_logits_with_chunking: False

# recompute entropy
entropy_checkpointing: False

# Whether to remove padding tokens in inputs during training
use_remove_padding: ${oc.select:actor_rollout_ref.model.use_remove_padding,false}

# This computes sum pi squared needed by token-baseline experiments.
calculate_sum_pi_squared: False

# Enable gradient checkpointing for sum_pi_squared computation.
sum_pi_squared_checkpointing: False

# QAT is not enabled for the HyperParallel smoke path.
qat:
  enable: false
  mode: "w4a16"
  group_size: 16
  ignore_patterns:
    - "lm_head"
    - "embed_tokens"
    - "re:.*mlp.gate$"
  activation_observer: "static_minmax"
  quantization_config_path: null
